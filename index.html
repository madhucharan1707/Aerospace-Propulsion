<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Engine Simulator</title>
  <link rel="icon" type="image/png" href="/icon.png" />

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b0e13;
    }

    #app {
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    /* UI Overlay */
    #ui-container {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20, 24, 30, 0.8);
      backdrop-filter: blur(8px);
      padding: 16px 24px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      gap: 12px;
      color: white;
      font-family: 'Inter', sans-serif;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      width: 300px;
      z-index: 100;
    }

    .control-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    label {
      font-size: 14px;
      color: #a0a0a0;
    }

    .value-display {
      font-family: 'Monaco', monospace;
      font-weight: bold;
      color: #4caf50;
    }

    input[type="range"] {
      width: 100%;
      margin-top: 8px;
      accent-color: #4caf50;
    }


    /* SPLASH SCREEN */
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, #1a202c 0%, #000 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s ease;
    }

    #splash-logo {
      width: 120px;
      height: 120px;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(14, 165, 233, 0.3);
      margin-bottom: 20px;
      object-fit: cover;
    }

    .loader {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="splash-screen">
    <img id="splash-logo" src="/icon.png" alt="PropulseAI Logo" />
    <div class="loader"></div>
    <div style="margin-top:20px; color:#64748b; font-family:sans-serif; font-size:12px; letter-spacing:2px;">
      INITIALIZING SYSTEMS...</div>
  </div>

  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
